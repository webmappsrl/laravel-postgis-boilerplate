
services:
  php:
    extends:
      file: compose.yml
      service: php
    ports:
      - ${DOCKER_SERVE_PORT}:8000
      - ${DOCKER_VITE_PORT}:5173
    platform: linux/amd64
  db:
    extends:
      file: compose.yml
      service: db
    platform: linux/amd64
  redis:
    extends:
      file: compose.yml
      service: redis
    platform: linux/amd64
  elasticsearch:
    extends:
      file: compose.yml
      service: elasticsearch
    platform: linux/amd64
  elasticsearch-init:
    extends:
      file: compose.yml
      service: elasticsearch-init
    environment:
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-changeme}
  kibana:
    extends:
      file: compose.yml
      service: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-changeme}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
    ports:
      - ${DOCKER_KIBANA_PORT:-5601}:5601
  horizon:
    extra_hosts:
      - host.docker.internal:host-gateway
    build: ./docker/configs/phpfpm
    restart: always
    container_name: "horizon-${APP_NAME}"
    image: wm-phpfpm:8.4
    command: php artisan horizon
    volumes:
      - ".:/var/www/html/${DOCKER_PROJECT_DIR_NAME}"
      - "../wm-package:/var/www/html/wm-package"
    working_dir: "/var/www/html/${DOCKER_PROJECT_DIR_NAME}"
    depends_on:
      - redis
      - db
    ports: []


  # needed for aws s3 storage testing
  minio:
    image: "minio/minio:latest"
    container_name: "minio-${APP_NAME}"
    ports:
      - "${FORWARD_MINIO_PORT:-9000}:9000"
      - "${FORWARD_MINIO_CONSOLE_PORT:-8900}:8900"
    environment:
      MINIO_ROOT_USER: laravel
      # at least 8 chars
      MINIO_ROOT_PASSWORD: laravelminio
    volumes:
      - "./docker/volumes/minio/data:/data/minio"
    command: 'minio server /data/minio --console-address ":8900"'
    platform: linux/amd64
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      retries: 3
      timeout: 5s
  # needed for mails testing
  mailpit:
    container_name: "mailpit-${APP_NAME}"
    image: "axllent/mailpit:latest"
    platform: linux/amd64
    ports:
    - "${FORWARD_MAILPIT_PORT:-1025}:1025"
    - "${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025"
